<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fake Website Detector</title>
  <style>
    body {
      width: 400px;
      min-height: 500px;
      margin: 0;
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #ffffff;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .header h1 {
      font-size: 18px;
      margin: 0;
      color: #00ffd0;
    }
    
    .input-group {
      margin-bottom: 15px;
    }
    
    input[type="text"] {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }
    
    input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }
    
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #00ffd0;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    button:hover {
      background: #00c0a0;
      transform: translateY(-2px);
    }
    
    button:disabled {
      background: #666;
      cursor: not-allowed;
      transform: none;
    }
    
    .result {
      margin-top: 20px;
      display: none;
    }
    
    .verdict {
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    
    .safe { background: rgba(46, 125, 50, 0.8); }
    .warning { background: rgba(251, 192, 45, 0.8); color: #000; }
    .danger { background: rgba(198, 40, 40, 0.8); }
    
    .score-bar {
      height: 20px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 15px;
    }
    
    .score-fill {
      height: 100%;
      text-align: center;
      color: white;
      font-weight: bold;
      line-height: 20px;
      font-size: 12px;
      transition: width 0.5s ease;
    }
    
    .trust-factor {
      background: rgba(255, 255, 255, 0.1);
      border-left: 4px solid #00ffd0;
      border-radius: 6px;
      padding: 8px 12px;
      margin: 8px 0;
      font-size: 12px;
    }
    
    .loading {
      text-align: center;
      color: #00ffd0;
      font-style: italic;
    }
    
    .current-url {
      background: rgba(255, 255, 255, 0.1);
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 12px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🛡️ AI Fake Website Detector</h1>
  </div>
  
  <div class="current-url" id="currentUrl">
    <strong>Current URL:</strong> <span id="urlText">Loading...</span>
  </div>
  
  <div class="input-group">
    <input type="text" id="urlInput" placeholder="Enter URL to analyze...">
  </div>
  
  <button id="analyzeBtn">🔍 Analyze Website</button>
  
  <div class="result" id="result">
    <div class="verdict" id="verdict"></div>
    <div class="score-bar">
      <div class="score-fill" id="scoreFill"></div>
    </div>
    <div id="trustFactors"></div>
  </div>
  
  <div class="loading" id="loading" style="display: none;">
    Analyzing website... Please wait...
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
