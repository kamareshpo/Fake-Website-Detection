<!DOCTYPE html>
<html>
<head>
    <title>Generate Extension Icons</title>
</head>
<body>
    <h1>Extension Icon Generator</h1>
    <p>Right-click on each icon and save it with the correct filename:</p>
    
    <div id="icons"></div>

    <script>
        function createIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#1e3c72');
            gradient.addColorStop(1, '#2a5298');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // Shield shape
            ctx.fillStyle = '#00ffd0';
            ctx.beginPath();
            ctx.moveTo(size * 0.5, size * 0.2);
            ctx.lineTo(size * 0.8, size * 0.3);
            ctx.lineTo(size * 0.8, size * 0.6);
            ctx.quadraticCurveTo(size * 0.8, size * 0.8, size * 0.5, size * 0.9);
            ctx.quadraticCurveTo(size * 0.2, size * 0.8, size * 0.2, size * 0.6);
            ctx.lineTo(size * 0.2, size * 0.3);
            ctx.closePath();
            ctx.fill();
            
            // Warning symbol
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.moveTo(size * 0.5, size * 0.35);
            ctx.lineTo(size * 0.6, size * 0.55);
            ctx.lineTo(size * 0.4, size * 0.55);
            ctx.closePath();
            ctx.fill();
            
            // Exclamation mark
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(size * 0.47, size * 0.6, size * 0.06, size * 0.15);
            ctx.beginPath();
            ctx.arc(size * 0.5, size * 0.78, size * 0.03, 0, 2 * Math.PI);
            ctx.fill();
            
            return canvas;
        }
        
        const sizes = [16, 32, 48, 128];
        const container = document.getElementById('icons');
        
        sizes.forEach(size => {
            const canvas = createIcon(size);
            const div = document.createElement('div');
            div.style.margin = '20px';
            div.style.display = 'inline-block';
            div.style.textAlign = 'center';
            
            const label = document.createElement('p');
            label.textContent = `icon${size}.png (${size}x${size})`;
            label.style.margin = '5px 0';
            
            div.appendChild(canvas);
            div.appendChild(label);
            container.appendChild(div);
        });
    </script>
</body>
</html>
